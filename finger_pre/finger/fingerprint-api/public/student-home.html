<!doctype html>
<html lang="th">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Fingerprint Attendance Prototype - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body style="background-color: #f4f5f7;">
    <header>
        <div class="brand">
            <div class="logo">FA</div>
            <div>
                <h1>Fingerprint Attendance System</h1>
            </div>
        </div>

        <div class="header-right">
            <span id="user-display" class="muted"></span>
            <button class="btn secondary" id="btn-logout">Logout</button>
        </div>
    </header>


    <main style="max-width: 800px; margin: 40px auto;">
        <h2 id="greeting-title" style="margin-bottom: 20px; color: #1e293b; font-size: 24px;">Hi, Loading...</h2>

        <!-- Profile Box -->
        <div class="card"
            style="margin-bottom: 20px; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff;">
            <div style="font-weight: 500; margin-bottom: 12px; color: #334155;">คุณเข้าสู่ระบบในชื่อ</div>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="profile-initials"
                    style="width: 40px; height: 40px; border-radius: 50%; background: #e2e8f0; color: #475569; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 16px;">
                </div>
                <div>
                    <div id="profile-name" style="font-weight: 700; font-size: 18px; color: #0f172a;"></div>
                    <div id="profile-email" style="color: #3b82f6; font-size: 14px; margin-top: 4px;">อีเมล: </div>
                </div>
            </div>
        </div>

        <!-- Search / Register Box -->
        <div class="card"
            style="margin-bottom: 20px; padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff;">
            <div style="font-weight: 500; margin-bottom: 12px; color: #334155;">ค้นหารายวิชาบนระบบ (เพื่อลงทะเบียน)
            </div>
            <div style="display: flex; gap: 0;">
                <select id="stu-register-select"
                    style="flex: 1; border-right: none; border-radius: 4px 0 0 4px; padding: 12px; border: 1px solid #cbd5e1; outline: none; font-size: 16px; -webkit-appearance: none; appearance: none; background: #fff;">
                    <option value="">ค้นหารายวิชา...</option>
                </select>
                <button onclick="enrollSubject()"
                    style="background-color: #f97316; color: white; border: none; padding: 0 20px; border-radius: 0 4px 4px 0; cursor: pointer; font-weight: bold;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                        viewBox="0 0 16 16">
                        <path
                            d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Registered Courses Box -->
        <div class="card" style="padding: 20px; border-radius: 8px; border: 1px solid #e2e8f0; background: #fff;">
            <div style="font-weight: 500; margin-bottom: 20px; color: #334155;">รายวิชาที่เข้าใช้ไม่นานมานี้
                (รายวิชาของคุณ)</div>
            <div id="student-my-courses-container" style="display: flex; gap: 20px; flex-wrap: wrap;">
                <div class="muted">Loading your courses...</div>
            </div>
        </div>

    </main>

    <!-- modal -->
    <div class="modal-backdrop" id="modal-backdrop">
        <div class="modal" id="modal"></div>
    </div>

    <script src="student-home.js"></script>
</body>

</html>
